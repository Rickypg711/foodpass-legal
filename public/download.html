<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#F28C38">
    <title>Descarga ANTO - Gana puntos en tus restaurantes favoritos</title>
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="apple-touch-icon" href="/anto-app-icon.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Solid base so Safari shows brand color before body/layout paint (avoids white flash). */
        html {
            background-color: #F28C38;
            min-height: 100%;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #F28C38 0%, #8B6F47 100%);
            background-color: #F28C38;
            min-height: 100vh;
            min-height: 100dvh;
            min-height: -webkit-fill-available;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: max(20px, env(safe-area-inset-top)) max(20px, env(safe-area-inset-right)) max(20px, env(safe-area-inset-bottom)) max(20px, env(safe-area-inset-left));
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .logo-wrap {
            margin: 0 auto 16px;
            width: 88px;
            height: 88px;
        }
        .logo-wrap img {
            width: 88px;
            height: 88px;
            border-radius: 22px;
            display: block;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
        }
        
        h1 {
            color: #1C2526;
            font-size: 32px;
            margin-bottom: 10px;
            font-weight: 700;
        }
        
        .subtitle {
            color: #666;
            font-size: 18px;
            margin-bottom: 30px;
            line-height: 1.5;
        }
        
        .features {
            text-align: left;
            margin: 30px 0;
            color: #1C2526;
        }
        
        .feature {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            font-size: 16px;
        }
        
        .feature-icon {
            width: 24px;
            height: 24px;
            margin-right: 12px;
            color: #F28C38;
            font-size: 20px;
        }
        
        .download-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 30px;
            align-items: center;
        }
        
        .badge-link {
            display: inline-block;
            transition: transform 0.2s, opacity 0.2s;
            text-decoration: none;
        }
        
        .badge-link:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }
        
        .badge-img {
            height: 60px;
            width: 180px;
            display: block;
            object-fit: contain;
        }
        
        .badge-link {
            width: 180px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .badge-link img {
            height: 60px;
            width: 180px;
            object-fit: contain;
        }
        
        @media (min-width: 768px) {
            .download-buttons {
                flex-direction: row;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <!-- Static first paint: no JS required. Store redirect runs only after body parses (script at end). -->
    <div class="container">
        <div class="logo-wrap">
            <img src="/anto-app-icon.png" alt="ANTO" width="88" height="88" fetchpriority="high" decoding="async">
        </div>
        <h1>ANTO</h1>
        <p id="ctx-hint" class="subtitle" style="display:none;color:#1C2526;font-weight:600;margin-bottom:12px;"></p>
        <p class="subtitle">Gana puntos en tus restaurantes favoritos y canjea recompensas reales</p>
        
        <div class="features">
            <div class="feature">
                <span class="feature-icon">⭐</span>
                <span>Gana puntos en cada visita</span>
            </div>
            <div class="feature">
                <span class="feature-icon">🎁</span>
                <span>Canjea recompensas gratis</span>
            </div>
            <div class="feature">
                <span class="feature-icon">📍</span>
                <span>Descubre restaurantes locales</span>
            </div>
            <div class="feature">
                <span class="feature-icon">👥</span>
                <span>Invita amigos y gana más</span>
            </div>
        </div>
        
        <div class="download-buttons">
            <a href="https://apps.apple.com/mx/app/foodpass/id6745301069" class="badge-link" target="_blank" rel="noopener noreferrer">
                <img src="/app-store-badge.svg" alt="Descargar en App Store" class="badge-img">
            </a>
            <a href="https://play.google.com/store/apps/details?id=com.ricardoparedes.foodpass" class="badge-link" target="_blank" rel="noopener noreferrer">
                <img src="/google-play-badge.png" alt="Disponible en Google Play" class="badge-img">
            </a>
        </div>
        
        <footer style="margin-top: 32px; padding-top: 20px; border-top: 1px solid #e8e8e8; text-align: center; color: #888; font-size: 13px;">
            <p>© 2024 ANTO. Todos los derechos reservados.</p>
            <p>Operamos ANTO.</p>
        </footer>
    </div>
    <script>
        /* Deep-link fallback: query params preserve context (type, restaurantId, linkId, referrerId).
           Do not auto-redirect to the store when context is present — user keeps URL for open-in-app / handoff.
           Script is at end of body so mobile Safari can paint HTML/CSS before any store redirect. */
        (function() {
            const params = new URLSearchParams(window.location.search);
            const hasCtx = params.get('type') || params.get('restaurantId');
            const userAgent = navigator.userAgent || navigator.vendor || window.opera;

            function contextualHint() {
                if (!hasCtx) return;
                const type = params.get('type') || '';
                const rid = params.get('restaurantId') || '';
                let msg = 'Abre ANTO para continuar.';
                if (type === 'menu' && rid) msg = 'Te compartieron un menú. Al abrir ANTO verás el menú de este lugar.';
                else if (type === 'restaurant' && rid) msg = 'Te compartieron un restaurante. Ábrelo en ANTO para ver el perfil.';
                else if (type === 'referral' && rid) msg = 'Te invitaron a un restaurante en ANTO. Abre la app para ver el perfil y tus beneficios.';
                const el = document.getElementById('ctx-hint');
                if (el) { el.textContent = msg; el.style.display = 'block'; }
            }
            contextualHint();

            if (hasCtx) return;

            function goStore() {
                if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
                    window.location.replace('https://apps.apple.com/mx/app/foodpass/id6745301069');
                    return;
                }
                if (/android/i.test(userAgent)) {
                    window.location.replace('https://play.google.com/store/apps/details?id=com.ricardoparedes.foodpass');
                }
            }

            var isIOS = /iPad|iPhone|iPod/.test(userAgent) && !window.MSStream;
            var isAndroid = /android/i.test(userAgent);
            if (!isIOS && !isAndroid) return;

            requestAnimationFrame(function() {
                requestAnimationFrame(function() {
                    setTimeout(goStore, 0);
                });
            });
        })();
    </script>
</body>
</html>
